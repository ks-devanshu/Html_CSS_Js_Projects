<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Age Calculator</h1>
        <label for="dob" id="prompt">Enter your date of birth:</label>
        <input type="date" name="dateOfBirth" id="dob" value="2010-05-20" autocomplete="off" min="1926-01-01" max="2026-06-15">
        <button id="calculate">Calculate Age</button>
        <p id="result"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
